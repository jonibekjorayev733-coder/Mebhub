services:
  - type: web
    name: mebhub-backend
    runtime: python
    region: oregon
    plan: free
    repo: https://github.com/jonibekjorayev733-coder/Mebhub.git
    branch: main
    rootDir: Uzgame
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_5udcFkn3wqTm@ep-old-breeze-a1fs7dt5-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://mebhub-frontend.onrender.com
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

  - type: web
    name: mebhub-frontend
    runtime: static
    repo: https://github.com/jonibekjorayev733-coder/Mebhub.git
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mebhub-backend.onrender.com
    routes:
      - source: /.*
        destination: /index.html
        type: rewrite
