services:
  - type: web
    name: mebhub-backend
    runtime: python
    pythonVersion: 3.11
    region: oregon
    plan: free
    repo: https://github.com/jonibekjorayev733-coder/Mebhub.git
    branch: main
    rootDir: Uzgame
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_5udcFkn3wqTm@ep-old-breeze-a1fs7dt5-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://mebhub-frontend.vercel.app,https://mebhub-backend.onrender.com
      - key: PORT
        value: '8000'
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000

  - type: static
    name: mebhub-frontend
    repo: https://github.com/jonibekjorayev733-coder/Mebhub.git
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: http://127.0.0.1:8000
    routes:
      - path: /*
        destination: /index.html
