services:
  - type: web
    name: mebhub-backend
    runtime: python
    pythonVersion: 3.11
    region: oregon
    plan: free
    
    repo: https://github.com/jonibekjorayev733-coder/Mebhub.git
    branch: main
    rootDir: Uzgame
    
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_5udcFkn3wqTm@ep-old-breeze-a1fs7dt5-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://mebhub-frontend.onrender.com,https://mebhub.onrender.com
    
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    
    healthCheckPath: /health

  - type: web
    name: mebhub-frontend
    runtime: node
    nodeVersion: 18
    region: oregon
    plan: free
    
    repo: https://github.com/jonibekjorayev733-coder/Mebhub.git
    branch: main
    
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mebhub-backend.onrender.com
      - key: VITE_FRONTEND_URL
        value: https://mebhub-frontend.onrender.com
    
    buildCommand: npm install && npm run build
    startCommand: npm install -g serve && serve -s dist -l 3000
