<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover:not(:disabled) {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .console {
            margin-top: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.4;
        }
        .console-line {
            margin: 5px 0;
        }
        .console-log { color: #d4d4d4; }
        .console-warn { color: #dcdcaa; }
        .console-error { color: #f48771; }
        .api-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .api-info strong {
            color: #667eea;
        }
        .demo-creds {
            background: #fff3cd;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #ffc107;
        }
        .demo-creds strong {
            display: block;
            margin-bottom: 5px;
            color: #856404;
        }
        button.demo {
            background: #ffc107;
            color: #333;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Test</h1>
        <p class="subtitle">Direct API test for debugging mobile login</p>

        <div class="api-info">
            <strong>API Base URL:</strong><br>
            <span id="apiUrl">Detecting...</span>
        </div>

        <div class="demo-creds">
            <strong>📝 Demo Credentials:</strong>
            Email: demo@example.com<br>
            Password: demo123
            <button class="demo" onclick="fillDemoCredentials()">Use Demo Creds</button>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="demo@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="demo123"
                    required
                >
            </div>

            <button type="submit" id="loginBtn">
                🚀 Test Login
            </button>
        </form>

        <div id="status"></div>
        <div class="console" id="console"></div>
    </div>

    <script>
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const statusDiv = document.getElementById('status');
        const consoleDiv = document.getElementById('console');
        const apiUrlDiv = document.getElementById('apiUrl');

        // Detect API URL
        function detectAPIUrl() {
            const env = window.__env__ || {};
            
            // Check localStorage (might be set)
            const storedUrl = localStorage.getItem('API_BASE_URL');
            if (storedUrl) return storedUrl;
            
            // Try environment detection
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://127.0.0.1:8000';
            }
            
            // For external access, try same host with port 8000
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            return `${protocol}//${hostname}:8000`;
        }

        const API_URL = detectAPIUrl();
        apiUrlDiv.textContent = API_URL;

        function log(message, type = 'log') {
            const line = document.createElement('div');
            line.className = `console-line console-${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console.log(message);
        }

        function fillDemoCredentials() {
            emailInput.value = 'demo@example.com';
            passwordInput.value = 'demo123';
            log('Demo credentials filled');
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = emailInput.value;
            const password = passwordInput.value;

            statusDiv.className = 'status loading';
            statusDiv.textContent = '⏳ Logging in...';
            loginBtn.disabled = true;
            consoleDiv.innerHTML = '';

            log('🔍 Detecting environment...');
            log(`📍 API URL: ${API_URL}`);
            log(`🌐 Page URL: ${window.location.href}`);
            log(`📧 Email: ${email}`);
            log('');
            log('🚀 Sending login request...');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                log(`📊 Response Status: ${response.status} ${response.statusText}`);

                const data = await response.json();

                if (response.ok) {
                    log(`✅ Login Successful!`, 'log');
                    log(`👤 User: ${data.user.full_name} (${data.user.email})`);
                    log(`🎫 Token: ${data.access_token.substring(0, 30)}...`);
                    log('');
                    log('✨ You can now:');
                    log('  1. Copy the token above');
                    log('  2. Use it in Authorization header for other requests');
                    log('  3. Try the full app at the same address');

                    statusDiv.className = 'status success';
                    statusDiv.textContent = `✅ Login Successful!\n\nUser: ${data.user.full_name}\nEmail: ${data.user.email}\n\nToken:\n${data.access_token}`;

                    // Save for reference
                    localStorage.setItem('test_token', data.access_token);
                    localStorage.setItem('test_user', JSON.stringify(data.user));
                } else {
                    log(`❌ Login Failed: ${data.detail || 'Unknown error'}`, 'error');
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ Login Failed\n\nError: ${data.detail || 'Unknown error'}`;
                }
            } catch (error) {
                log(`❌ Network Error: ${error.message}`, 'error');
                log('');
                log('Debugging Tips:');
                log('  1. Is the backend running? (npm run dev in Uzgame folder)');
                log('  2. Is the IP address correct? (check with ipconfig)');
                log('  3. Are backend and phone on same WiFi?');
                log('  4. Try accessing http://IP:8000/health from phone');
                
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Network Error\n\nCould not reach API server.\n\nError: ${error.message}\n\nMake sure:\n• Backend is running\n• Correct IP address\n• Same WiFi network`;
            } finally {
                loginBtn.disabled = false;
            }
        }

        // Initialize
        log('🔐 Login Test Page Ready');
        log(`🌐 Detected API URL: ${API_URL}`);
        log('Enter credentials and click "Test Login"');
    </script>
</body>
</html>
