# fly.toml app configuration file generated for mebhub-backend on 2026-04-02T00:00:00Z

app = 'mebhub-backend'
primary_region = 'sjc'

[build]
  dockerfile = "Uzgame/Dockerfile"

[env]
  DATABASE_URL = "postgresql://neondb_owner:npg_5udcFkn3wqTm@ep-old-breeze-a1fs7dt5-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
  ENVIRONMENT = "production"
  CORS_ORIGINS = "https://mebhub.vercel.app,http://localhost:5173"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'

[[services]]
  protocol = "tcp"
  internal_port = 8000
  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 850

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"
    method = "get"
    path = "/health"
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
